<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vans</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar"><div class="logo">VANS</div></header>
    <main>
        <section class="skate-hero">
            <h1 class="pop">OFF THE WALL</h1>
            <div class="polaroid pop delay-1"><img src="assets/hero.svg" alt="Skater"></div>
        </section>
        <section class="classics">
            <div class="checker-bg"></div>
            <div class="classics-content pop">
                <h2>THE CLASSIC SLIP-ON</h2>
                <img src="assets/product1.svg" alt="Vans Shoe" class="shoe-img">
            </div>
        </section>
    
        
        <section class="classics" style="background: var(--red); color: white;">
            <div class="classics-content pop">
                <h2 style="background: white; color: var(--black);">CUSTOMS</h2>
                <p style="font-size: 1.5rem; margin-top: 20px; font-weight: bold;">Make your own shoes. Express yourself.</p>
            </div>
        </section>
        <section class="skate-hero" style="min-height: 50vh; background: var(--black);">
            <h2 class="pop" style="font-size: 4rem; color: white; transform: rotate(2deg);">PRO SKATE TEAM</h2>
        </section>

        <section id="newsletter" class="newsletter-section" style="padding: 100px 5%; text-align: center; border-top: 1px solid rgba(128,128,128,0.2);">
            <div class="container reveal-up" style="max-width: 600px; margin: 0 auto;">
                <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">JOIN THE EXCLUSIVE</h2>
                <p style="margin-bottom: 2rem; opacity: 0.8;">Subscribe to receive updates, access to exclusive deals, and more.</p>
                <form style="display: flex; gap: 1rem; justify-content: center;">
                    <input type="email" placeholder="Enter your email" style="padding: 1rem; flex: 1; border: 1px solid #ccc; background: transparent; color: inherit;">
                    <button type="submit" style="padding: 1rem 2rem; background: #333; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold;">Subscribe</button>
                </form>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
