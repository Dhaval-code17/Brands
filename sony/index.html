<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony</title>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar"><div class="logo">SONY</div></header>
    <main>
        <section class="tech-hero">
            <h1 class="glow-in">CREATIVITY OUT OF THE BOX</h1>
            <div class="neon-frame glow-in delay-1"><img src="assets/hero.svg" alt="Sony Tech"></div>
        </section>
        <section class="alpha-cam">
            <div class="alpha-content glow-in">
                <h2>ALPHA VISION</h2>
                <img src="assets/product1.svg" alt="Camera Lens">
            </div>
        </section>
    
        
        <section class="alpha-cam" style="background: #111;">
            <div class="alpha-content glow-in">
                <h2 style="color: var(--neon-blue);">PLAYSTATION 5</h2>
                <p style="font-size: 1.5rem; margin-bottom: 30px;">Play Has No Limits.</p>
                <div class="neon-frame"><div style="width: 600px; height: 300px; background: #000;"></div></div>
            </div>
        </section>
        <section class="tech-hero" style="min-height: 50vh;">
            <h2 class="glow-in" style="font-size: 3rem; text-shadow: 0 0 10px var(--neon-pink);">BRAVIA XR DISPLAY</h2>
        </section>

        <section id="newsletter" class="newsletter-section" style="padding: 100px 5%; text-align: center; border-top: 1px solid rgba(128,128,128,0.2);">
            <div class="container reveal-up" style="max-width: 600px; margin: 0 auto;">
                <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">JOIN THE EXCLUSIVE</h2>
                <p style="margin-bottom: 2rem; opacity: 0.8;">Subscribe to receive updates, access to exclusive deals, and more.</p>
                <form style="display: flex; gap: 1rem; justify-content: center;">
                    <input type="email" placeholder="Enter your email" style="padding: 1rem; flex: 1; border: 1px solid #ccc; background: transparent; color: inherit;">
                    <button type="submit" style="padding: 1rem 2rem; background: #333; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold;">Subscribe</button>
                </form>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
