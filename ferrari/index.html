<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrari</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Work+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">FERRARI</div>
        <div class="menu-icon">|||</div>
    </header>

    <main>
        <section class="hero">
            <div class="bg-slant red-slant reveal-slide"></div>
            <div class="hero-content">
                <h1 class="reveal-text">SCUDERIA</h1>
                <h2 class="reveal-text delay-1">UNLEASH THE ROAR</h2>
                <div class="hero-img-box reveal-scale delay-2">
                    <img src="assets/hero.jpg" alt="Ferrari Hero" class="hero-img">
                </div>
            </div>
        </section>

        <section class="heritage">
            <div class="bg-slant black-slant"></div>
            <div class="heritage-grid">
                <div class="img-col reveal-right">
                    <img src="assets/product1.jpg" alt="Ferrari Detail">
                </div>
                <div class="text-col reveal-left">
                    <h3>IL CAVALLINO RAMPANTE</h3>
                    <p>Born on the track. Built for the road. The pinnacle of Italian engineering, pushing the limits of speed and design since 1947.</p>
                    <a href="#" class="btn-fast">EXPLORE RACING</a>
                </div>
            </div>
        </section>
    
        <section id="newsletter" class="newsletter-section" style="padding: 100px 5%; text-align: center; border-top: 1px solid rgba(128,128,128,0.2);">
            <div class="container reveal-up" style="max-width: 600px; margin: 0 auto;">
                <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">JOIN THE EXCLUSIVE</h2>
                <p style="margin-bottom: 2rem; opacity: 0.8;">Subscribe to receive updates, access to exclusive deals, and more.</p>
                <form style="display: flex; gap: 1rem; justify-content: center;">
                    <input type="email" placeholder="Enter your email" style="padding: 1rem; flex: 1; border: 1px solid #ccc; background: transparent; color: inherit;">
                    <button type="submit" style="padding: 1rem 2rem; background: #333; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold;">Subscribe</button>
                </form>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
